<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" fill="none">
  <rect width="1200" height="680" rx="24" fill="#0f172a"/>
  <rect x="50" y="50" width="1100" height="580" rx="30" fill="#111827" stroke="#22c55e" stroke-width="3"/>
  <text x="85" y="100" fill="#e5eefc" font-size="32" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Estrutura de Região, VPC, Zonas de Disponibilidade e Subnets</text>
  <text x="85" y="136" fill="#aebdd7" font-size="19" font-family="Segoe UI, Arial, sans-serif">A VPC vive dentro da região e pode ter subnets distribuídas por diferentes AZs.</text>

  <rect x="100" y="180" width="1000" height="390" rx="28" fill="#172033" stroke="#7dd3fc" stroke-width="2"/>
  <text x="128" y="224" fill="#7dd3fc" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Região</text>

  <rect x="150" y="265" width="900" height="255" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="178" y="305" fill="#22c55e" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">VPC</text>

  <rect x="200" y="345" width="250" height="125" rx="18" fill="#111827" stroke="#7dd3fc" stroke-width="2"/>
  <text x="230" y="382" fill="#7dd3fc" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AZ-a</text>
  <rect x="225" y="402" width="200" height="44" rx="12" fill="#172033" stroke="#22c55e" stroke-width="2"/>
  <text x="255" y="431" fill="#e5eefc" font-size="20" font-family="Segoe UI, Arial, sans-serif">Subnet A</text>

  <rect x="475" y="345" width="250" height="125" rx="18" fill="#111827" stroke="#7dd3fc" stroke-width="2"/>
  <text x="505" y="382" fill="#7dd3fc" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AZ-b</text>
  <rect x="500" y="402" width="200" height="44" rx="12" fill="#172033" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="431" fill="#e5eefc" font-size="20" font-family="Segoe UI, Arial, sans-serif">Subnet B</text>

  <rect x="750" y="345" width="250" height="125" rx="18" fill="#111827" stroke="#7dd3fc" stroke-width="2"/>
  <text x="780" y="382" fill="#7dd3fc" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AZ-c</text>
  <rect x="775" y="402" width="200" height="44" rx="12" fill="#172033" stroke="#22c55e" stroke-width="2"/>
  <text x="805" y="431" fill="#e5eefc" font-size="20" font-family="Segoe UI, Arial, sans-serif">Subnet C</text>

  <text x="160" y="610" fill="#aebdd7" font-size="18" font-family="Segoe UI, Arial, sans-serif">Região  →  VPC  →  AZ  →  Subnet</text>
</svg>
